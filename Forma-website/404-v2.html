<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Void | Forma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="forma-styles.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--cream);
            color: var(--dark);
            position: relative;
            overflow: hidden;
        }
        .void-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60vh;
            height: 60vh;
            border: 1px solid rgba(15,14,12,0.05);
            border-radius: 50%;
            z-index: 1;
        }
        .void-circle::after {
            content: '';
            position: absolute;
            inset: 4rem;
            border: 1px solid rgba(184,151,90,0.1);
            border-radius: 50%;
        }
        .error-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
            padding: 2rem;
        }
        .error-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            margin-bottom: 2rem;
        }
        .error-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 2rem;
            color: var(--dark);
        }
        .error-title em { font-style: italic; color: var(--gold); }
        .error-desc {
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--muted);
            margin-bottom: 3rem;
        }
        .btn-dark {
            background: var(--dark);
            color: var(--cream);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 1.1rem 3rem;
            border: none;
            cursor: none;
            font-family: 'Outfit', sans-serif;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .btn-dark:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <div class="error-page">
        <div class="void-circle"></div>
        <div class="error-content">
            <div class="error-num">404</div>
            <h1 class="error-title">An <em>empty</em> space.</h1>
            <p class="error-desc">We couldn't find the coordinates for the page you requested. It seems this part of the studio remains unbuilt.</p>
            <a href="index.html" class="btn-dark">Back to the studio</a>
        </div>
    </div>

    <script src="forma-script.js"></script>
</body>
</html>
