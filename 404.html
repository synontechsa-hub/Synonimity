<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Wit Not Found</title>
    <link rel="icon" type="image/png" href="assets/BG_favicon.png">
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0d0d0d;
            color: #ffcc00;
            text-align: center;
            padding: 50px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            text-shadow: 0 0 10px #ffcc00;
        }

        p {
            font-size: 1.8rem;
            max-width: 600px;
            margin: 20px 0;
        }

        .btn {
            background: #ffcc00;
            color: #0d0d0d;
            padding: 15px 30px;
            font-size: 1.2rem;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #ffd633;
            transform: scale(1.05);
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="emoji">🤖💥</div>
    <h1>404</h1>
    <p><strong>Wit Not Found</strong><br>
        The page you're looking for has gone on a coffee break and forgot to come back.<br>
        Meanwhile, my sarcasm module is still loading...</p>

    <a href="/" class="btn">Go Back to Safety (or try refreshing)</a>

    <p style="margin-top: 50px; font-size: 1rem; opacity: 0.7;">
        Pro tip: This is what happens when the Idiot Operator strikes again.
    </p>
</body>

</html>
